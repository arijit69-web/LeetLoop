<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetLoop Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page-shell">
      <section class="panel auth-shell">
        <div class="panel-head">
          <h3 id="authTitle">Login</h3>
          <p id="authHint">Sign in to continue</p>
        </div>

        <div class="connect-grid">
          <input id="emailInput" class="field" type="email" placeholder="Email" />
          <input id="passwordInput" class="field" type="password" placeholder="Password" />
          <input id="leetcodeUsernameInput" class="field" type="text" placeholder="LeetCode username (register only)" />
        </div>

        <div class="hero-actions">
          <button id="submitBtn" class="btn btn-primary" type="button">Login</button>
          <button id="toggleModeBtn" class="btn btn-ghost" type="button">Switch to Register</button>
          <button id="backBtn" class="btn btn-ghost" type="button">Back</button>
        </div>

        <p id="status" class="state-msg">Enter your details</p>
      </section>
    </main>

    <script src="/auth.js"></script>
  </body>
</html>
