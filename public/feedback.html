<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetLoop Feedback</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="feedback">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page-shell">
      <nav class="panel app-nav">
        <div class="nav-left"><h2>LeetLoop</h2><p id="navStatus">Checking session...</p></div>
        <div class="nav-links">
          <a class="nav-link" data-nav="home" href="/">Home</a>
          <a class="nav-link" data-nav="revisions" href="/revisions.html">Revisions</a>
          <a class="nav-link" data-nav="calendar" href="/calendar.html">Calendar</a>
          <a class="nav-link" data-nav="jobs" href="/jobs.html">Jobs</a>
          <a class="nav-link" data-nav="connect" href="/connect.html">Connect</a>
          <a class="nav-link" data-nav="feedback" href="/feedback.html">Feedback</a>
        </div>
        <div class="hero-actions nav-actions">
          <button id="navRegisterBtn" class="btn btn-primary" type="button">Register</button>
          <button id="navLoginBtn" class="btn btn-ghost" type="button">Login</button>
          <button id="navLogoutBtn" class="btn btn-ghost" type="button">Logout</button>
        </div>
      </nav>

      <section class="panel">
        <div class="panel-head">
          <h3>Report Bug / Feedback</h3>
          <p id="feedbackStatus">Share issues or suggestions</p>
        </div>
        <div class="connect-grid">
          <select id="feedbackKind" class="field">
            <option value="bug">Bug</option>
            <option value="feedback">Feedback</option>
          </select>
          <input id="feedbackTitle" class="field" type="text" placeholder="Short title" maxlength="140" />
          <textarea id="feedbackDescription" class="field field-area" placeholder="Describe what happened, expected behavior, and steps to reproduce" maxlength="5000"></textarea>
        </div>
        <div class="hero-actions">
          <button id="submitFeedbackBtn" class="btn btn-primary" type="button">Submit</button>
          <button id="refreshFeedbackBtn" class="btn btn-ghost" type="button">Refresh My Reports</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>My Recent Reports</h3>
          <p>Last 30</p>
        </div>
        <div id="feedbackList" class="history-list"></div>
      </section>
    </main>

    <script src="/shared.js"></script>
    <script src="/feedback.js"></script>
  </body>
</html>
